<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Asistente Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0e;--bg2:#141416;--bg3:#1a1a1e;--bg4:#222228;
  --border:#252528;--border2:#2e2e34;
  --text:#f0f0f4;--sub:#888;--muted:#555;--faint:#333;
  --orange:#ff6b2b;--blue:#4a9eff;--purple:#b06aff;
  --pink:#ff5fac;--green:#00d084;--amber:#ffb300;--red:#ff4444;
  --font-display:'Syne',sans-serif;--font:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
button{font-family:var(--font);cursor:pointer;border:none;}
input,textarea{font-family:var(--font);}
details summary{list-style:none;cursor:pointer;}
details summary::-webkit-details-marker{display:none;}
#root{display:flex;flex-direction:column;min-height:100vh;max-width:640px;margin:0 auto;}

/* HEADER */
.header{padding:16px 16px 0;background:var(--bg);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--orange),var(--purple));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:20px;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(255,107,43,.3);}
.brand-name{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.3px;line-height:1;}
.brand-date{font-size:12px;color:var(--muted);margin-top:2px;}
.header-actions{display:flex;gap:6px;align-items:center;}
.hbtn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--sub);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;text-decoration:none;}
.hbtn:hover{background:var(--bg4);color:var(--text);}
.hbtn-icon{font-size:15px;}
.hbtn-label{display:none;}
@media(min-width:420px){.hbtn-label{display:inline;}}
.hbtn-alert{background:#1a1200;border-color:var(--amber);color:var(--amber);}
.hbtn-alert:hover{background:#2a1e00;}

/* TABS */
.nav-scroll{display:flex;gap:4px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;position:relative;transition:all .15s;}
.tab.active{background:var(--bg3);color:var(--text);}
.tab-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 5px;min-width:16px;text-align:center;}
.header-sep{height:1px;background:var(--border);margin:0 -16px;}

/* BACKUP PANEL */
.bk-panel{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px;}
.bk-alert-msg{font-size:13px;color:var(--amber);font-weight:700;margin-bottom:8px;}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.bk-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 10px;font-size:13px;font-weight:600;text-align:center;transition:background .12s;}
.bk-btn:hover{background:var(--bg4);}
label.bk-btn{cursor:pointer;display:block;}
.bk-btn-drive{background:#061428;border:1px solid var(--blue);color:var(--blue);}
.bk-btn-drive:hover{background:#0a1e38;}
.bk-btn-drive:disabled{opacity:.5;cursor:default;}
.bk-btn-green{background:#061a10;border:1px solid var(--green);color:var(--green);}
.bk-btn-green:hover{background:#0a2416;}
.bk-close{background:none;border:none;color:var(--muted);font-size:12px;display:block;margin:8px auto 0;padding:4px 12px;}
.notif-on{font-size:12px;color:var(--green);margin-top:4px;text-align:center;}

/* DROPDOWN */
.dropdown-wrap{position:relative;}
.dropdown{position:absolute;top:calc(100% + 6px);right:0;background:#18181c;border:1px solid var(--border2);border-radius:14px;padding:12px;min-width:170px;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,.7);}
.drop-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.drop-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;background:var(--bg3);color:var(--text);font-size:14px;font-weight:600;margin-bottom:6px;text-align:left;transition:background .12s;}
.drop-opt:last-child{margin-bottom:0;}
.drop-opt:hover{background:var(--bg4);}

/* MAIN */
.main{flex:1;padding:0 14px 100px;}
.sec{padding-top:14px;}
.sec-head{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;}

/* STAT BOXES */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;transition:border-color .2s,background .2s;}
.stat-box.urgent{border-color:var(--red);background:#150404;}
.stat-box.warn{border-color:var(--amber);background:#130f00;}
.stat-n{font-size:26px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;}

/* BANNERS */
.banner{border-radius:12px;padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.banner-red{background:#150404;border:1px solid var(--red);}
.banner-amber{background:#130f00;border:1px solid var(--amber);}
.banner-title{font-weight:700;font-size:14px;}
.banner-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* DAYS BADGE */
.days-badge{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;text-align:center;line-height:1.2;}
.days-over{background:#2a0808;color:var(--red);}
.days-hoy{background:#2a1200;color:var(--orange);}
.days-soon{background:#1a1200;color:var(--amber);}
.days-ok{background:#081a08;color:var(--green);}

/* CARDS */
.card{display:flex;align-items:flex-start;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:10px;gap:12px;}
.card-overdue{border-left:3px solid var(--red)!important;background:#110404!important;}
.card-today{border-left:3px solid var(--orange)!important;}
.card-soon{border-left:3px solid var(--amber)!important;}
.card-left{flex:1;min-width:0;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.card-title{font-weight:600;font-size:15px;line-height:1.35;margin-bottom:3px;}
.card-sub{font-size:12px;color:var(--sub);line-height:1.4;margin-bottom:3px;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;color:#ddd;}
.chip-red{background:#3a0a0a;}.chip-amber{background:#2a1800;}.chip-blue{background:#0a1a30;}
.chip-green{background:#062010;}.chip-purple{background:#1a0a30;}.chip-gray{background:#1e1e24;}

/* CONTROLS */
.check-area{width:28px;height:28px;border-radius:8px;flex-shrink:0;border:2px solid var(--border2);background:transparent;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.check-area:hover{border-color:var(--green);}
.check-area.done{background:var(--green);border-color:var(--green);}
.del-btn{background:none;border:none;color:var(--faint);font-size:20px;line-height:1;padding:0;transition:color .12s;}
.del-btn:hover{color:var(--red);}
.paid-btn{background:#062010;border:1px solid var(--green);border-radius:8px;color:var(--green);padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap;}
.paid-btn:hover{background:#0a2818;}
.undo-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:4px;}
.amount{font-size:22px;font-weight:800;color:var(--blue);line-height:1;margin-bottom:4px;}
.done-summary{color:var(--muted);font-size:13px;font-weight:600;padding:8px 0;}

/* ALL CLEAR */
.all-clear{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;gap:8px;}
.all-clear-emoji{font-size:56px;}
.all-clear-title{font-family:var(--font-display);font-weight:800;font-size:22px;}
.all-clear-sub{color:var(--muted);font-size:14px;}

/* METAS */
.progress-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:3px;transition:width .3s;}
.progress-row{display:flex;align-items:center;gap:10px;width:100%;}
.progress-pct{color:var(--purple);font-weight:800;font-size:14px;min-width:36px;text-align:right;}
input[type=range]{width:100%;accent-color:var(--purple);margin:0;}

/* HÁBITOS */
.hab-dots{display:flex;gap:4px;width:100%;}
.hab-dot{flex:1;height:22px;border-radius:5px;transition:background .2s;}
.hab-dot-label{font-size:9px;color:var(--muted);text-align:center;margin-top:2px;}
.streak{font-size:12px;color:var(--amber);}
.week-pct{font-size:11px;color:var(--muted);margin-left:auto;}

/* NOTAS */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding-top:16px;}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.note-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.note-body{font-size:13px;color:var(--sub);line-height:1.6;min-height:60px;cursor:text;white-space:pre-wrap;word-break:break-word;}
.note-ta{width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px;font-size:13px;resize:vertical;outline:none;}
.note-footer{font-size:11px;color:var(--faint);}
.sm-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:2px 4px;}

/* FAB */
.fab{position:fixed;bottom:78px;right:20px;width:54px;height:54px;border-radius:16px;color:#fff;font-size:30px;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.fab:active{transform:scale(.92);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:rgba(12,12,14,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;position:relative;}
.nav-emoji{font-size:18px;line-height:1;}
.nav-label{font-size:10px;line-height:1;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);font-size:9px;border-radius:999px;padding:1px 5px;color:#fff;font-weight:800;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:flex-end;justify-content:center;z-index:999;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:22px 18px 40px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-weight:800;font-size:20px;margin-bottom:18px;}
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;font-weight:600;color:var(--muted);}
.form-input{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;width:100%;}
.form-btns{display:flex;gap:10px;margin-top:6px;}
.btn-prim{flex:1;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px;font-family:var(--font);}
.btn-sec{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;color:var(--sub);font-weight:600;font-size:15px;font-family:var(--font);}
.btn-danger{flex:1;background:#4a0a0a;border:none;border-radius:12px;padding:14px;color:var(--red);font-weight:700;font-size:15px;font-family:var(--font);}
.confirm-msg{font-size:17px;font-weight:600;text-align:center;padding:8px 0 20px;}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);border:1px solid;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.toast-ok{background:#06200e;border-color:var(--green);color:var(--green);}
.toast-err{background:#2a0606;border-color:var(--red);color:var(--red);}
.empty{color:var(--faint);font-size:15px;text-align:center;padding:60px 0;}
</style>
</head>
<body>
<div id="root"></div>
<div id="fallback" style="display:none;padding:20px;color:#ff4444;font-family:sans-serif;background:#0c0c0e;min-height:100vh;">
  <h2>Error al cargar</h2>
  <p id="err-msg"></p>
  <p style="color:#888;font-size:13px">Abre la consola del navegador (F12) para más detalles.</p>
</div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("root").style.display = "none";
  document.getElementById("fallback").style.display = "block";
  document.getElementById("err-msg").textContent = msg + " (línea " + line + ")";
};
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

const STORAGE_KEY = "asistente_v3";
const BACKUP_KEY  = "asistente_last_backup";
const DRIVE_CLIENT_ID = "625753563994-ckkovl3isvbmajduferhvhcf4qr3lqsc.apps.googleusercontent.com";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata";
const DRIVE_FILE  = "asistente_data.json";
const SECTIONS    = ["hoy","tareas","pagos","metas","hábitos","notas"];
const MONTHS      = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const DAYS        = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

const S_META = {
  hoy:     {label:"Hoy",     emoji:"⚡", color:"#f59e0b"},
  tareas:  {label:"Tareas",  emoji:"✓",  color:"#ff6b2b"},
  pagos:   {label:"Pagos",   emoji:"$",  color:"#4a9eff"},
  metas:   {label:"Metas",   emoji:"◎",  color:"#b06aff"},
  hábitos: {label:"Hábitos", emoji:"↺",  color:"#ff5fac"},
  notas:   {label:"Notas",   emoji:"≡",  color:"#00d084"},
};

const uid       = () => Math.random().toString(36).slice(2,9);
const today     = () => new Date().toISOString().split("T")[0];
const fmt       = iso => { if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${+d} ${MONTHS[+m-1]} ${y}`; };
const daysUntil = iso => { if(!iso) return null; return Math.ceil((new Date(iso)-new Date(today()))/86400000); };

function loadData()  { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch { return null; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function emptyData() { return {tareas:[],pagos:[],metas:[],notas:[],hábitos:[]}; }

// ── Notifications (single summary) ───────────────────────────────────────────
async function requestNotifPermission() {
  if(!("Notification" in window)) return false;
  if(Notification.permission==="granted") return true;
  return (await Notification.requestPermission())==="granted";
}
let _summaryFired = false;
function checkNotifs(data) {
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  if(_summaryFired) return;
  const t = today();
  const urgT  = data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)<=0).length;
  const proxT  = data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)>0&&daysUntil(x.dueDate)<=3).length;
  const urgP   = data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)<=0).length;
  const proxP  = data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)>0&&daysUntil(x.dueDate)<=3).length;
  const habP   = data.hábitos.filter(x=>!x.checks?.[t]).length;
  const sinF   = data.tareas.filter(x=>!x.done&&!x.dueDate).length;
  const partes = [];
  if(urgT>0)  partes.push(`🚨 ${urgT} tarea${urgT>1?"s":""} vencida${urgT>1?"s":""}`);
  if(urgP>0)  partes.push(`💸 ${urgP} pago${urgP>1?"s":""} vencido${urgP>1?"s":""}`);
  if(proxT>0) partes.push(`⏰ ${proxT} tarea${proxT>1?"s":""} en 3d`);
  if(proxP>0) partes.push(`💳 ${proxP} pago${proxP>1?"s":""} en 3d`);
  if(habP>0)  partes.push(`↺ ${habP} hábito${habP>1?"s":""} pendiente${habP>1?"s":""}`);
  if(sinF>0)  partes.push(`📋 ${sinF} sin fecha`);
  if(partes.length===0) return;
  _summaryFired = true;
  try { new Notification("📋 Tu día de un vistazo", {body: partes.join("  ·  ")}); } catch {}
}

// ── Drive ─────────────────────────────────────────────────────────────────────
let _driveToken = null;
async function driveGetToken() {
  if(_driveToken) return _driveToken;
  return new Promise((res,rej) => {
    if(typeof google==="undefined"||!google.accounts) { rej("Google SDK no cargado"); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID, scope: DRIVE_SCOPE,
      callback: resp => {
        if(resp.error) { rej(resp.error); return; }
        _driveToken = resp.access_token;
        setTimeout(()=>{ _driveToken=null; }, 3500000);
        res(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}
async function driveFindFile(token) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE}'&fields=files(id)`, {headers:{Authorization:`Bearer ${token}`}});
  const j = await r.json();
  return j.files&&j.files.length>0 ? j.files[0].id : null;
}
async function driveSave(data) {
  const token = await driveGetToken();
  const blob  = new Blob([JSON.stringify({...data,savedAt:new Date().toISOString()},null,2)], {type:"application/json"});
  let fileId  = await driveFindFile(token);
  if(!fileId) {
    const meta = await fetch("https://www.googleapis.com/drive/v3/files", {method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({name:DRIVE_FILE,parents:["appDataFolder"]})});
    fileId = (await meta.json()).id;
  }
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:blob});
}
async function driveLoad() {
  const token  = await driveGetToken();
  const fileId = await driveFindFile(token);
  if(!fileId) return null;
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {headers:{Authorization:`Bearer ${token}`}});
  return await r.json();
}

// ── Email ─────────────────────────────────────────────────────────────────────
function buildEmail(data) {
  const t=today(), lines=["=== RESUMEN DE HOY ===\n"];
  const urgT=data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)<=1);
  const urgP=data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)<=1);
  const habP=data.hábitos.filter(x=>!x.checks?.[t]);
  const allT=data.tareas.filter(x=>!x.done);
  if(urgT.length){lines.push("📌 TAREAS URGENTES:");urgT.forEach(x=>lines.push(`  • ${x.title}${x.dueTime?` a las ${x.dueTime}`:""}`));lines.push("");}
  if(urgP.length){lines.push("💸 PAGOS URGENTES:");urgP.forEach(x=>lines.push(`  • ${x.title}${x.amount?` $${x.amount}`:""}`));lines.push("");}
  if(habP.length){lines.push("↺ HÁBITOS PENDIENTES:");habP.forEach(x=>lines.push(`  • ${x.title}`));lines.push("");}
  if(allT.length){lines.push(`✓ TODAS LAS TAREAS (${allT.length}):`);allT.forEach(x=>lines.push(`  • ${x.title}${x.dueDate?` — ${fmt(x.dueDate)}${x.dueTime?` ${x.dueTime}`:""}`:""}`));lines.push("");}
  lines.push(`Asistente Personal — ${fmt(t)}`);
  return lines.join("\n");
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [data,     setData]     = useState(()=>loadData()||emptyData());
  const [section,  setSection]  = useState("hoy");
  const [modal,    setModal]    = useState(null);
  const [delConf,  setDelConf]  = useState(null);
  const [toast,    setToast]    = useState(null);
  const [notifOn,  setNotifOn]  = useState(()=>typeof Notification!=="undefined"&&Notification.permission==="granted");
  const [showEmail,setShowEmail]= useState(false);
  const [showBk,   setShowBk]   = useState(false);
  const [bkAlert,  setBkAlert]  = useState(false);
  const [driveStatus, setDriveStatus] = useState("idle");
  const [driveMsg,    setDriveMsg]    = useState("");

  useEffect(()=>{ saveData(data); }, [data]);
  useEffect(()=>{
    const last=localStorage.getItem(BACKUP_KEY);
    if(!last){ localStorage.setItem(BACKUP_KEY,today()); return; }
    if(Math.ceil((new Date(today())-new Date(last))/86400000)>=7) setBkAlert(true);
  },[]);
  useEffect(()=>{ if(notifOn) checkNotifs(data); }, [data,notifOn]);

  const showToast = (msg,type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),2400); };

  function mutate(fn) { setData(d=>{ const nd=fn({...d}); saveData(nd); return nd; }); }
  const addItem    = (sec,item) => { mutate(d=>{ d[sec]=[...d[sec],{...item,id:uid(),createdAt:today()}]; return d; }); showToast("Guardado ✓"); };
  const updateItem = (sec,id,u) => { mutate(d=>{ d[sec]=d[sec].map(i=>i.id===id?{...i,...u}:i); return d; }); };
  const deleteItem = (sec,id)   => { mutate(d=>{ d[sec]=d[sec].filter(i=>i.id!==id); return d; }); showToast("Eliminado"); };

  function exportData() {
    const blob=new Blob([JSON.stringify({...data,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`asistente-${today()}.json`; a.click();
    localStorage.setItem(BACKUP_KEY,today()); setBkAlert(false); setShowBk(false); showToast("Backup descargado ✓");
  }
  function importData(e) {
    const file=e.target.files?.[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ try { const p=JSON.parse(ev.target.result); if(!["tareas","pagos","metas","notas","hábitos"].every(k=>Array.isArray(p[k]))) throw new Error(); mutate(()=>({tareas:p.tareas,pagos:p.pagos,metas:p.metas,notas:p.notas,hábitos:p.hábitos})); showToast("Datos importados ✓"); setShowBk(false); } catch { showToast("Archivo inválido","err"); } };
    r.readAsText(file); e.target.value="";
  }
  async function enableNotifs() {
    const ok=await requestNotifPermission();
    if(ok){ setNotifOn(true); checkNotifs(data); showToast("Notificaciones activas ✓"); }
    else showToast("Permiso denegado","err");
  }
  function openEmail(p) {
    const body=encodeURIComponent(buildEmail(data)), subj=encodeURIComponent(`📋 Mis pendientes — ${fmt(today())}`);
    const url=p==="gmail"?`https://mail.google.com/mail/?view=cm&fs=1&su=${subj}&body=${body}`:`https://outlook.live.com/mail/0/deeplink/compose?subject=${subj}&body=${body}`;
    window.open(url,"_blank"); setShowEmail(false);
  }
  async function driveSaveHandler() {
    setDriveStatus("saving"); setDriveMsg("Guardando en Drive...");
    try { await driveSave(data); localStorage.setItem(BACKUP_KEY,today()); setBkAlert(false); setDriveStatus("ok"); setDriveMsg("Guardado en Drive ✓"); showToast("Guardado en Drive ✓"); }
    catch(e) { setDriveStatus("err"); setDriveMsg("Error: "+String(e)); showToast("Error al guardar","err"); }
  }
  async function driveLoadHandler() {
    setDriveStatus("loading"); setDriveMsg("Cargando desde Drive...");
    try {
      const p=await driveLoad();
      if(!p) throw new Error("No hay datos en Drive");
      if(!["tareas","pagos","metas","notas","hábitos"].every(k=>Array.isArray(p[k]))) throw new Error("Formato inválido");
      mutate(()=>({tareas:p.tareas,pagos:p.pagos,metas:p.metas,notas:p.notas,hábitos:p.hábitos}));
      setDriveStatus("ok"); setDriveMsg("Datos cargados ✓"); showToast("Datos cargados desde Drive ✓"); setShowBk(false);
    } catch(e) { setDriveStatus("err"); setDriveMsg("Error: "+String(e)); showToast("Error al cargar","err"); }
  }

  const now=new Date();
  const dateStr=`${DAYS[now.getDay()]} ${now.getDate()} de ${MONTHS[now.getMonth()]}`;
  const aC=S_META[section].color;
  const t=today();
  const counts={
    hoy:     data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)<=0).length+data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)<=0).length,
    tareas:  data.tareas.filter(x=>!x.done).length,
    pagos:   data.pagos.filter(x=>!x.paid).length,
    metas:   data.metas.length,
    hábitos: data.hábitos.filter(x=>!x.checks?.[t]).length,
    notas:   data.notas.length,
  };
  const sp = sec => ({update:(id,u)=>updateItem(sec,id,u), del:id=>setDelConf({sec,id})});

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"#0c0c0e",color:"#f0f0f4",fontFamily:"'DM Sans',sans-serif",maxWidth:640,margin:"0 auto"}}>
      <header className="header">
        <div className="header-top">
          <div className="brand">
            <div className="brand-icon">A</div>
            <div>
              <div className="brand-name">Asistente</div>
              <div className="brand-date">{dateStr}</div>
            </div>
          </div>
          <div className="header-actions">
            <a href="../" className="hbtn"><span className="hbtn-icon">←</span><span className="hbtn-label">Inicio</span></a>
            {bkAlert&&<button className="hbtn hbtn-alert" onClick={()=>{setShowBk(v=>!v);setShowEmail(false);}}><span className="hbtn-icon">💾</span></button>}
            <div className="dropdown-wrap">
              <button className="hbtn" onClick={()=>{setShowEmail(v=>!v);setShowBk(false);}}><span className="hbtn-icon">✉</span><span className="hbtn-label">Email</span></button>
              {showEmail&&(<div className="dropdown"><div className="drop-title">Enviar resumen</div><button className="drop-opt" onClick={()=>openEmail("gmail")}>📧 Gmail</button><button className="drop-opt" onClick={()=>openEmail("outlook")}>📨 Outlook</button></div>)}
            </div>
            <button className="hbtn" onClick={()=>{setShowBk(v=>!v);setShowEmail(false);}}><span className="hbtn-icon">⇅</span><span className="hbtn-label">Backup</span></button>
          </div>
        </div>
        <div className="nav-scroll">
          {SECTIONS.map(s=>{ const m=S_META[s],active=s===section; return (
            <button key={s} className={`tab${active?" active":""}`} style={active?{color:m.color}:{}} onClick={()=>setSection(s)}>
              <span>{m.emoji}</span>{m.label}
              {counts[s]>0&&<span className="tab-badge" style={{background:active?m.color:"#333"}}>{counts[s]}</span>}
            </button>
          );})}
        </div>
        <div className="header-sep"/>
      </header>

      {showBk&&(
        <div className="bk-panel">
          {bkAlert&&<div className="bk-alert-msg">⚠️ 7+ días sin backup</div>}
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Respaldo de datos</div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>Drive guarda en tu cuenta de forma privada.</div>
          <div className="bk-grid" style={{marginBottom:6}}>
            <button className="bk-btn bk-btn-drive" onClick={driveSaveHandler} disabled={driveStatus==="saving"}>{driveStatus==="saving"?"⏳ Guardando…":"☁ Guardar en Drive"}</button>
            <button className="bk-btn bk-btn-drive" onClick={driveLoadHandler} disabled={driveStatus==="loading"}>{driveStatus==="loading"?"⏳ Cargando…":"☁ Cargar desde Drive"}</button>
          </div>
          {driveMsg&&<div style={{fontSize:12,color:driveStatus==="ok"?"var(--green)":driveStatus==="err"?"var(--red)":"var(--muted)",marginBottom:8}}>{driveMsg}</div>}
          <div style={{height:1,background:"var(--border)",margin:"8px 0"}}/>
          <div className="bk-grid">
            <button className="bk-btn" onClick={exportData}>⬇ Descargar .json</button>
            <label className="bk-btn">⬆ Importar .json<input type="file" accept=".json" style={{display:"none"}} onChange={importData}/></label>
          </div>
          {!notifOn?<button className="bk-btn bk-btn-green" style={{width:"100%",marginTop:8}} onClick={enableNotifs}>🔔 Activar notificaciones</button>:<div className="notif-on">🔔 Notificaciones activas ✓</div>}
          <button className="bk-close" onClick={()=>setShowBk(false)}>Cerrar</button>
        </div>
      )}

      <main className="main">
        {section==="hoy"     && <HoyView    data={data} update={updateItem} del={(s,id)=>setDelConf({sec:s,id})}/>}
        {section==="tareas"  && <TareasView  items={data.tareas}  {...sp("tareas")}/>}
        {section==="pagos"   && <PagosView   items={data.pagos}   {...sp("pagos")}/>}
        {section==="metas"   && <MetasView   items={data.metas}   {...sp("metas")}/>}
        {section==="hábitos" && <HabitosView items={data.hábitos} {...sp("hábitos")}/>}
        {section==="notas"   && <NotasView   items={data.notas}   {...sp("notas")}/>}
      </main>

      {section!=="hoy"&&<button className="fab" style={{background:aC}} onClick={()=>setModal(section)}>+</button>}

      <nav className="bottom-nav">
        {SECTIONS.map(s=>{ const m=S_META[s],active=s===section; return (
          <button key={s} className="nav-item" onClick={()=>setSection(s)}>
            <span className="nav-emoji" style={{color:active?m.color:"#555"}}>{m.emoji}</span>
            <span className="nav-label" style={{color:active?m.color:"#555",fontWeight:active?700:400}}>{m.label}</span>
            {counts[s]>0&&<span className="nav-badge" style={{background:active?m.color:"#2a2a2a"}}>{counts[s]}</span>}
          </button>
        );})}
      </nav>

      {modal&&<Modal onClose={()=>setModal(null)}><AddForm section={modal} onSave={item=>{addItem(modal,item);setModal(null);}} onCancel={()=>setModal(null)}/></Modal>}
      {delConf&&<Modal onClose={()=>setDelConf(null)}>
        <div className="confirm-msg">¿Eliminar este elemento?</div>
        <div className="form-btns">
          <button className="btn-sec" onClick={()=>setDelConf(null)}>Cancelar</button>
          <button className="btn-danger" onClick={()=>{deleteItem(delConf.sec,delConf.id);setDelConf(null);}}>Eliminar</button>
        </div>
      </Modal>}
      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function DaysBadge({d}) {
  const cls   = d<0?"days-over":d===0?"days-hoy":d<=3?"days-soon":"days-ok";
  const label = d<0?`-${-d}d`:d===0?"HOY":d===1?"MÑN":`${d}d`;
  return <div className={`days-badge ${cls}`}>{label}</div>;
}
function StatBox({n,label,color,urgent,warn}) {
  return (
    <div className={`stat-box${urgent?" urgent":warn?" warn":""}`}>
      <div className="stat-n" style={{color}}>{n}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}
function Modal({children,onClose}) {
  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal">{children}</div></div>;
}
function Empty({text}) { return <div className="empty">{text}</div>; }

// ── HOY ───────────────────────────────────────────────────────────────────────
function HoyView({data,update,del}) {
  const t=today();
  const urgT  = data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)<=0).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const urgP  = data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)<=0).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const proxT = data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)>0&&daysUntil(x.dueDate)<=3).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const proxP = data.pagos.filter(x=>!x.paid&&x.dueDate&&daysUntil(x.dueDate)>0&&daysUntil(x.dueDate)<=3).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const semT  = data.tareas.filter(x=>!x.done&&x.dueDate&&daysUntil(x.dueDate)>3&&daysUntil(x.dueDate)<=7).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,3);
  const sinF  = data.tareas.filter(x=>!x.done&&!x.dueDate);
  const habP  = data.hábitos.filter(x=>!x.checks?.[t]);
  const habD  = data.hábitos.filter(x=>x.checks?.[t]);
  const totUrg  = urgT.length+urgP.length;
  const totProx = proxT.length+proxP.length;
  const vacio   = totUrg===0&&totProx===0&&semT.length===0&&sinF.length===0&&habP.length===0;

  return (
    <div className="sec">
      <div className="stat-grid">
        <StatBox n={data.tareas.filter(x=>!x.done).length} label="Tareas" color="var(--orange)" urgent={urgT.length>0} warn={urgT.length===0&&proxT.length>0}/>
        <StatBox n={data.pagos.filter(x=>!x.paid).length} label="Pagos" color="var(--blue)" urgent={urgP.length>0} warn={urgP.length===0&&proxP.length>0}/>
        <StatBox n={`${habD.length}/${data.hábitos.length}`} label="Hábitos" color="var(--pink)" warn={habP.length>0}/>
      </div>

      {totUrg>0&&<div className="banner banner-red">
        <span style={{fontSize:22}}>🚨</span>
        <div><div className="banner-title">{totUrg} elemento{totUrg>1?"s":""} vencido{totUrg>1?"s":""} o vence HOY</div><div className="banner-sub">Requiere{totUrg===1?"":"n"} atención inmediata</div></div>
      </div>}
      {totUrg===0&&totProx>0&&<div className="banner banner-amber">
        <span style={{fontSize:20}}>⏰</span>
        <div className="banner-title">{totProx} elemento{totProx>1?"s":""} vence{totProx===1?"":"n"} en los próximos 3 días</div>
      </div>}

      {vacio&&<div className="all-clear"><div className="all-clear-emoji">✨</div><div className="all-clear-title">¡Todo al día!</div><div className="all-clear-sub">Sin pendientes urgentes.</div></div>}

      {totUrg>0&&<>
        <div className="sec-head" style={{color:"var(--red)"}}>Vencido o vence hoy</div>
        {urgT.map(x=>{ const d=daysUntil(x.dueDate); return (
          <div key={x.id} className={`card ${d<0?"card-overdue":"card-today"}`}>
            <DaysBadge d={d}/>
            <div className="card-left">
              <div className="card-title">{x.title}</div>
              {x.note&&<div className="card-sub">{x.note}</div>}
              {x.dueTime&&<div className="card-meta"><span className="chip chip-gray">🕐 {x.dueTime}</span></div>}
            </div>
            <div className="card-right">
              <button className="del-btn" onClick={()=>del("tareas",x.id)}>×</button>
              <button className="check-area" onClick={()=>update("tareas",x.id,{done:true})}>✓</button>
            </div>
          </div>
        );})}
        {urgP.map(x=>{ const d=daysUntil(x.dueDate); return (
          <div key={x.id} className={`card ${d<0?"card-overdue":"card-today"}`}>
            <DaysBadge d={d}/>
            <div className="card-left">
              <div className="card-title">{x.title}</div>
              {x.amount&&<div className="amount">${x.amount}</div>}
            </div>
            <div className="card-right">
              <button className="del-btn" onClick={()=>del("pagos",x.id)}>×</button>
              <button className="paid-btn" onClick={()=>update("pagos",x.id,{paid:true})}>Pagado ✓</button>
            </div>
          </div>
        );})}
      </>}

      {totProx>0&&<>
        <div className="sec-head" style={{color:"var(--amber)"}}>Próximos 3 días</div>
        {proxT.map(x=>{ const d=daysUntil(x.dueDate); return (
          <div key={x.id} className="card card-soon">
            <DaysBadge d={d}/>
            <div className="card-left">
              <div className="card-title">{x.title}</div>
              {x.note&&<div className="card-sub">{x.note}</div>}
              {x.dueTime&&<div className="card-meta"><span className="chip chip-gray">🕐 {x.dueTime}</span></div>}
            </div>
            <button className="del-btn" onClick={()=>del("tareas",x.id)}>×</button>
          </div>
        );})}
        {proxP.map(x=>{ const d=daysUntil(x.dueDate); return (
          <div key={x.id} className="card card-soon">
            <DaysBadge d={d}/>
            <div className="card-left">
              <div className="card-title">{x.title}</div>
              {x.amount&&<div style={{color:"var(--blue)",fontWeight:700}}>${x.amount}</div>}
            </div>
            <div className="card-right">
              <button className="del-btn" onClick={()=>del("pagos",x.id)}>×</button>
              <button className="paid-btn" onClick={()=>update("pagos",x.id,{paid:true})}>Pagado ✓</button>
            </div>
          </div>
        );})}
      </>}

      {semT.length>0&&<>
        <div className="sec-head" style={{color:"var(--muted)"}}>Esta semana</div>
        {semT.map(x=>{ const d=daysUntil(x.dueDate); return (
          <div key={x.id} className="card">
            <DaysBadge d={d}/>
            <div className="card-left"><div className="card-title">{x.title}</div>{x.note&&<div className="card-sub">{x.note}</div>}</div>
            <button className="del-btn" onClick={()=>del("tareas",x.id)}>×</button>
          </div>
        );})}
      </>}

      {sinF.length>0&&<>
        <div className="sec-head" style={{color:"var(--muted)"}}>Pendientes sin fecha ({sinF.length})</div>
        {sinF.map(x=>(
          <div key={x.id} className="card">
            <button className="check-area" onClick={()=>update("tareas",x.id,{done:true})}>○</button>
            <div className="card-left"><div className="card-title">{x.title}</div>{x.note&&<div className="card-sub">{x.note}</div>}</div>
            <button className="del-btn" onClick={()=>del("tareas",x.id)}>×</button>
          </div>
        ))}
      </>}

      {data.hábitos.length>0&&<>
        <div className="sec-head" style={{color:"var(--pink)"}}>Hábitos hoy — {habD.length}/{data.hábitos.length}</div>
        {habP.map(x=>(
          <div key={x.id} className="card" style={{borderLeft:"3px solid var(--pink)"}}>
            <button className="check-area" onClick={()=>update("hábitos",x.id,{checks:{...(x.checks||{}),[t]:true}})}>○</button>
            <div className="card-left"><div className="card-title">{x.title}</div></div>
            <button className="del-btn" onClick={()=>del("hábitos",x.id)}>×</button>
          </div>
        ))}
        {habD.map(x=>(
          <div key={x.id} className="card" style={{opacity:.35,borderLeft:"3px solid var(--green)"}}>
            <button className="check-area done" onClick={()=>update("hábitos",x.id,{checks:{...(x.checks||{}),[t]:false}})}>✓</button>
            <div className="card-left"><div className="card-title" style={{textDecoration:"line-through"}}>{x.title}</div></div>
          </div>
        ))}
      </>}
    </div>
  );
}

// ── TAREAS ────────────────────────────────────────────────────────────────────
function TareasView({items,update,del}) {
  const pend=items.filter(x=>!x.done).sort((a,b)=>(a.dueDate||"z").localeCompare(b.dueDate||"z")||((a.dueTime||"99").localeCompare(b.dueTime||"99")));
  const done=items.filter(x=>x.done);
  return (
    <div className="sec">
      {items.length===0&&<Empty text="Sin tareas. Toca + para agregar."/>}
      {pend.map(x=>{ const d=x.dueDate?daysUntil(x.dueDate):null; return (
        <div key={x.id} className={`card${d!==null&&d<0?" card-overdue":d===0?" card-today":d!==null&&d<=3?" card-soon":""}`}>
          <button className="check-area" onClick={()=>update(x.id,{done:true})}>○</button>
          <div className="card-left">
            <div className="card-title">{x.title}</div>
            {x.note&&<div className="card-sub">{x.note}</div>}
            {(x.dueDate||x.dueTime)&&<div className="card-meta">
              {x.dueDate&&<span className={`chip ${d<0?"chip-red":d===0?"chip-amber":d<=3?"chip-amber":"chip-blue"}`}>{d<0?`Venció hace ${-d}d`:d===0?"HOY":d===1?"Mañana":fmt(x.dueDate)}</span>}
              {x.dueTime&&<span className="chip chip-gray">🕐 {x.dueTime}</span>}
            </div>}
          </div>
          <button className="del-btn" onClick={()=>del(x.id)}>×</button>
        </div>
      );})}
      {done.length>0&&<details style={{marginTop:8}}><summary className="done-summary">Completadas ({done.length})</summary><div style={{marginTop:8}}>{done.map(x=>(
        <div key={x.id} className="card" style={{opacity:.4}}>
          <button className="check-area done" onClick={()=>update(x.id,{done:false})}>✓</button>
          <div className="card-left"><div className="card-title" style={{textDecoration:"line-through"}}>{x.title}</div></div>
          <button className="del-btn" onClick={()=>del(x.id)}>×</button>
        </div>
      ))}</div></details>}
    </div>
  );
}

// ── PAGOS ─────────────────────────────────────────────────────────────────────
function PagosView({items,update,del}) {
  const pend=items.filter(x=>!x.paid).sort((a,b)=>(a.dueDate||"z").localeCompare(b.dueDate||"z"));
  const paid=items.filter(x=>x.paid);
  return (
    <div className="sec">
      {items.length===0&&<Empty text="Sin pagos. Toca + para agregar."/>}
      {pend.map(x=>{ const d=x.dueDate?daysUntil(x.dueDate):null; return (
        <div key={x.id} className={`card${d!==null&&d<0?" card-overdue":d===0?" card-today":d!==null&&d<=3?" card-soon":""}`}>
          <div className="card-left">
            <div className="card-title">{x.title}</div>
            {x.amount&&<div className="amount">${x.amount}</div>}
            {x.note&&<div className="card-sub">{x.note}</div>}
            {x.dueDate&&<div className="card-meta"><span className={`chip ${d<0?"chip-red":d<=1?"chip-amber":d<=3?"chip-amber":"chip-blue"}`}>{d<0?`Venció hace ${-d}d`:d===0?"HOY":d===1?"Mañana":`Vence ${fmt(x.dueDate)}`}</span></div>}
          </div>
          <div className="card-right">
            <button className="del-btn" onClick={()=>del(x.id)}>×</button>
            <button className="paid-btn" onClick={()=>update(x.id,{paid:true})}>Pagado ✓</button>
          </div>
        </div>
      );})}
      {paid.length>0&&<details style={{marginTop:8}}><summary className="done-summary">Pagados ({paid.length})</summary><div style={{marginTop:8}}>{paid.map(x=>(
        <div key={x.id} className="card" style={{opacity:.4}}>
          <div className="card-left"><div className="card-title" style={{textDecoration:"line-through"}}>{x.title}{x.amount?` — $${x.amount}`:""}</div></div>
          <div style={{display:"flex",gap:6}}><button className="undo-btn" onClick={()=>update(x.id,{paid:false})}>↩</button><button className="del-btn" onClick={()=>del(x.id)}>×</button></div>
        </div>
      ))}</div></details>}
    </div>
  );
}

// ── METAS ─────────────────────────────────────────────────────────────────────
function MetasView({items,update,del}) {
  return (
    <div className="sec">
      {items.length===0&&<Empty text="Sin metas. Toca + para agregar."/>}
      {items.map(x=>(
        <div key={x.id} className="card" style={{flexDirection:"column",alignItems:"stretch",gap:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div className="card-title">{x.title}</div>{x.note&&<div className="card-sub">{x.note}</div>}{x.dueDate&&<div className="card-meta"><span className="chip chip-purple">Meta: {fmt(x.dueDate)}</span></div>}</div>
            <button className="del-btn" onClick={()=>del(x.id)}>×</button>
          </div>
          <div className="progress-row"><div className="progress-wrap"><div className="progress-fill" style={{width:`${x.progress||0}%`}}/></div><span className="progress-pct">{x.progress||0}%</span></div>
          <input type="range" min={0} max={100} value={x.progress||0} onChange={e=>update(x.id,{progress:parseInt(e.target.value)})} style={{width:"100%",accentColor:"var(--purple)",margin:0}}/>
        </div>
      ))}
    </div>
  );
}

// ── HÁBITOS ───────────────────────────────────────────────────────────────────
function HabitosView({items,update,del}) {
  const t=today();
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().split("T")[0]; });
  const dayLabels=last7.map(d=>DAYS[new Date(d+"T12:00:00").getDay()]);
  return (
    <div className="sec">
      {items.length===0&&<Empty text="Sin hábitos. Toca + para agregar."/>}
      {items.map(x=>{ const checks=x.checks||{}, doneToday=!!checks[t]; let streak=0; for(let i=last7.length-1;i>=0;i--){ if(checks[last7[i]])streak++; else break; } const pct=Math.round(last7.filter(d=>checks[d]).length/7*100); return (
        <div key={x.id} className="card" style={{flexDirection:"column",alignItems:"stretch",gap:10,borderLeft:`3px solid ${doneToday?"var(--green)":"var(--border2)"}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button className={`check-area${doneToday?" done":""}`} onClick={()=>update(x.id,{checks:{...checks,[t]:!doneToday}})}>{doneToday?"✓":""}</button>
              <div><div className="card-title">{x.title}</div>{x.note&&<div className="card-sub">{x.note}</div>}</div>
            </div>
            <button className="del-btn" onClick={()=>del(x.id)}>×</button>
          </div>
          <div className="hab-dots">{last7.map((d,i)=>(<div key={d} style={{flex:1,textAlign:"center"}}><div className="hab-dot" style={{background:checks[d]?"var(--green)":"var(--bg4)"}}/><div className="hab-dot-label">{dayLabels[i]}</div></div>))}</div>
          <div style={{display:"flex",alignItems:"center"}}>{streak>0&&<span className="streak">🔥 {streak}d</span>}<span className="week-pct">{pct}% esta semana</span></div>
        </div>
      );})}
    </div>
  );
}

// ── NOTAS ─────────────────────────────────────────────────────────────────────
function NotasView({items,update,del}) {
  const [editing,setEditing]=useState(null);
  return (
    <div className="notes-grid">
      {items.length===0&&<div style={{gridColumn:"1/-1"}}><Empty text="Sin notas. Toca + para agregar."/></div>}
      {items.map(x=>(
        <div key={x.id} className="note-card">
          <div className="note-top">
            <div className="card-title" style={{fontSize:14}}>{x.title}</div>
            <div style={{display:"flex",gap:4}}><button className="sm-btn" onClick={()=>setEditing(editing===x.id?null:x.id)}>✎</button><button className="del-btn" onClick={()=>del(x.id)}>×</button></div>
          </div>
          {editing===x.id?<textarea autoFocus className="note-ta" value={x.note||""} onChange={e=>update(x.id,{note:e.target.value})} onBlur={()=>setEditing(null)}/>:<div className="note-body" onClick={()=>setEditing(x.id)}>{x.note||<span style={{color:"var(--faint)"}}>Toca para escribir…</span>}</div>}
          <div className="note-footer">{fmt(x.createdAt)}</div>
        </div>
      ))}
    </div>
  );
}

// ── ADD FORM ──────────────────────────────────────────────────────────────────
function AddForm({section,onSave,onCancel}) {
  const [f,setF]=useState({title:"",note:"",dueDate:"",dueTime:"",amount:"",progress:0});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const color=S_META[section].color;
  const hasDeadline=section==="tareas"||section==="pagos"||section==="metas";
  return (
    <div className="form-grid">
      <div className="modal-title" style={{color}}>{S_META[section].emoji} {S_META[section].label}</div>
      <div className="form-group"><label className="form-label">Título *</label><input className="form-input" placeholder="¿Qué es?" value={f.title} onChange={e=>set("title",e.target.value)} autoFocus/></div>
      {section!=="notas"&&<div className="form-group"><label className="form-label">Nota / detalle</label><input className="form-input" placeholder="Opcional" value={f.note} onChange={e=>set("note",e.target.value)}/></div>}
      {hasDeadline&&<div className="form-row">
        <div className="form-group"><label className="form-label">{section==="pagos"?"Fecha de vencimiento":"Fecha límite"}</label><input className="form-input" type="date" value={f.dueDate} onChange={e=>set("dueDate",e.target.value)}/></div>
        {section!=="pagos"&&<div className="form-group"><label className="form-label">Hora (opcional)</label><input className="form-input" type="time" value={f.dueTime} onChange={e=>set("dueTime",e.target.value)}/></div>}
      </div>}
      {section==="pagos"&&<div className="form-group"><label className="form-label">Monto</label><input className="form-input" type="number" placeholder="0.00" value={f.amount} onChange={e=>set("amount",e.target.value)}/></div>}
      {section==="metas"&&<div className="form-group"><label className="form-label">Progreso inicial: {f.progress}%</label><input type="range" min={0} max={100} value={f.progress} onChange={e=>set("progress",+e.target.value)} style={{width:"100%",accentColor:color}}/></div>}
      <div className="form-btns">
        <button className="btn-sec" onClick={onCancel}>Cancelar</button>
        <button className="btn-prim" style={{background:color}} onClick={()=>{if(!f.title.trim())return;onSave(f);}}>Guardar</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
